name: Run linter

on:
  push:
    branches-ignore:
      - main

jobs:
  linter:
    name: Linter

    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Nodejs and npm
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.1
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate types
        run: npm run prepare

      - name: Run linter
        run: npm run lint
